name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build artifacts
        run: ./gradlew :cli:shadowJar :cli:distZip --no-daemon --console=plain
      - name: Print sha256 (for brew/scoop manifests)
        run: sha256sum cli/build/libs/stele.jar
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli/build/libs/stele.jar
            cli/build/distributions/*.zip
          generate_release_notes: true
